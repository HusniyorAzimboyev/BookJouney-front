<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Book Journey</title>
    <link rel="icon" href="/static/img/favicon.png" type="image/png" sizes="40x40">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .dark {
            background: #0f0f23;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .login-card {
            background: rgba(15, 15, 35, 0.9);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation" style="animation-delay: 2s;"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation" style="animation-delay: 4s;"></div>
    </div>
    
    <div class="relative z-10 w-full max-w-6xl">
        <!-- Admin Login Card -->
        <div class="login-card rounded-3xl p-12 shadow-2xl" id="loginCard">
            <div class="text-center mb-10">
                <div class="w-24 h-24 bg-gradient-to-br from-purple-600 to-pink-600 rounded-3xl flex items-center justify-center mx-auto mb-6 floating">
                    <i class="fas fa-shield-alt text-white text-4xl"></i>
                </div>
                <h1 class="text-4xl font-bold text-white mb-3">Admin Panel</h1>
                <p class="text-white/60 text-lg">Book Journey boshqaruv tizimi</p>
                <div class="mt-6 flex items-center justify-center space-x-8 text-white/40">
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-book"></i>
                        <span>127+ Kitoblar</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-users"></i>
                        <span>5K+ Foydalanuvchilar</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-chart-line"></i>
                        <span>Real-time Analytics</span>
                    </div>
                </div>
            </div>
            
            <form id="loginForm" class="space-y-8">
                <div>
                    <label class="block text-white/80 text-lg font-medium mb-4">Admin Paroli</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="adminPassword"
                            placeholder="🔐 Admin parolini kiriting..."
                            class="w-full px-6 py-4 bg-white/10 border-2 border-white/20 rounded-2xl text-white placeholder-white/50 text-lg focus:outline-none focus:border-purple-400 focus:bg-white/20 transition text-center"
                            required
                        >
                        <button type="button" id="togglePassword" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-white/60 hover:text-white text-xl">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div id="errorMessage" class="hidden bg-red-500/20 border-2 border-red-500/50 text-red-400 px-6 py-4 rounded-2xl text-lg">
                    <i class="fas fa-exclamation-triangle mr-3"></i>
                    <span id="errorText">Noto'g'ri parol</span>
                </div>
                
                <button 
                    type="submit"
                    class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-2xl font-bold text-lg hover:from-purple-700 hover:to-pink-700 transition transform hover:scale-105 flex items-center justify-center space-x-3 shadow-xl"
                >
                    <i class="fas fa-sign-in-alt text-xl"></i>
                    <span>Admin Panelga Kirish</span>
                </button>
                
                <div class="grid grid-cols-3 gap-4 pt-6">
                    <div class="bg-white/5 rounded-xl p-4 text-center border border-white/10">
                        <i class="fas fa-shield-alt text-purple-400 text-2xl mb-2"></i>
                        <p class="text-white/60 text-sm">Xavfsiz</p>
                    </div>
                    <div class="bg-white/5 rounded-xl p-4 text-center border border-white/10">
                        <i class="fas fa-bolt text-yellow-400 text-2xl mb-2"></i>
                        <p class="text-white/60 text-sm">Tezkor</p>
                    </div>
                    <div class="bg-white/5 rounded-xl p-4 text-center border border-white/10">
                        <i class="fas fa-chart-line text-green-400 text-2xl mb-2"></i>
                        <p class="text-white/60 text-sm">Analitika</p>
                    </div>
                </div>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-white/40 text-base">
                    <i class="fas fa-info-circle mr-2"></i>
                    Faqat admin uchun • Parol: <span class="text-purple-400 font-mono">329329</span>
                </p>
                <div class="mt-6 flex items-center justify-center space-x-6 text-white/30">
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-lock"></i>
                        <span class="text-sm">SSL Himoya</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-database"></i>
                        <span class="text-sm">Ma'lumotlar Saqlangan</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-sync"></i>
                        <span class="text-sm">Real-time Sync</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Admin Dashboard (Hidden Initially) -->
        <div class="hidden" id="adminDashboard">
            <!-- Dashboard will be loaded here -->
        </div>
    </div>
    
    <script src="static/js/config.js"></script>
    <script src="static/js/api-service.js"></script>
    <script src="static/js/admin-panel.js"></script>
</body>
</html>
